name: Compilar Instalador de Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar el código en la máquina virtual
      uses: actions/checkout@v4

    - name: 2. Configurar python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.2'
    
    - name: 3. Instalar dependencias (librerias)
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview
        pip install -r requirements.txt

    - name: 4. Compilar con pyinstaller 
      run: |
        pyinstaller --noconsole --onedir --icon="backend\icono.ico" --add-data "frontend;frontend" backend\main.py

    - name: 5. Compilar instalador con Inno Setup
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" instalador.iss

    - name: 6. Subir el instalador final para descargarlo
      uses: actions/upload-artifact@v4
      with:
        name: Mi-instalador-Windows
        path: output/
